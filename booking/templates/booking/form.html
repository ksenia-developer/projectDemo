{% extends 'booking/base.html' %}
{% block title %}{{ title }} · Конференции.РФ{% endblock %}
{% block content %}
<section class="card form-card">
  <h1>{{ title }}</h1>
  <form method="post" novalidate data-form="{{ title|slugify }}">
    {% csrf_token %}
    {% for field in form %}
      <label class="field">
        <span>{{ field.label }}</span>
        {{ field }}
        {% if field.help_text %}<small>{{ field.help_text }}</small>{% endif %}
        {% for error in field.errors %}<small class="error">{{ error }}</small>{% endfor %}
      </label>
    {% endfor %}
    {% if form.non_field_errors %}<div class="error">{{ form.non_field_errors }}</div>{% endif %}
    <button class="btn" type="submit">{{ button }}</button>
  </form>
</section>
{% endblock %}
